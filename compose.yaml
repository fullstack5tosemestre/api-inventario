services:
    api:
        # image: xdainz/api-inventario
        build: .
        ports:
            - 9090:9090
        depends_on:
            db:
                condition: service_healthy
    db:
        image: mysql
        container_name: inventario-db
        restart: always
        volumes:
            - mysql_data:/var/lib/mysql
        environment:
            - MYSQL_ALLOW_EMPTY_PASSWORD=yes
            - MYSQL_DATABASE=db_inventario
        expose:
            - 3306
        healthcheck:
            test:
                ["CMD", "mysqladmin", "--user=root", "--host=localhost", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
volumes:
    mysql_data:
